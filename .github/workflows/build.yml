name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build (ad-hoc signed)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project ScrollSnap.xcodeproj \
            -scheme ScrollSnap \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=build/products \
            build

      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH="build/products/Release/ScrollSnap.app"
          codesign --force --deep --sign - --timestamp=none "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package app bundle
        run: |
          mkdir -p dist
          cp -R build/products/Release/ScrollSnap.app dist/
          hdiutil create \
            -volname "ScrollSnap Build" \
            -srcfolder dist \
            -ov \
            -format UDZO \
            ScrollSnap-adhoc-signed.dmg
